<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Browser</title>
    <link rel="stylesheet" href="main.css">
    <script type="text/javascript" src="main.js" defer></script>
  </head>
  <!--
    Palette: 000814 001D3D 003566 FFC300 FFD60A
             Ink    Pruss  Navy   Bus    Gold
  -->
  <body class="bg-[#000814]">
    <div id="container" 
         class=
         "text-white 
          max-w-300 
          m-auto 
          p-10
          pt-0
          rounded-sm">
      <nav id="top" class="flex flex-row text-black flex-row-reverse">
        <div class="bg-[#FFD60A] p-2 m-3 ml-0 rounded-r-lg flex flex-row">
          <button class="pr-3">Account</button>
          <img src="user.jpg" class="w-10 rounded-full">
        </div>
        <button class="bg-[#FFC300] p-2 m-3 ml-0">Filler</button>
        <button class="bg-[#FFC300] p-2 m-3 ml-0">Filler</button>
        <button class="bg-[#FFC300] p-2 m-3 ml-0 rounded-l-lg">Filler</button>
      </nav>

      <div>
        <h1 class="text-5xl">
          Uni Restaurant Browser
        </h1>
      </div>

      <div>

        <div id="menu-container" class="mt-6 bg-[#001D3D] p-4 rounded-t-lg">
          <h2 class="text-2xl mb-2">Ruokalista</h2>
          <div id="menu-list"></div>
        </div>

        <div class="flex gap-4 mb-4">
          <button id="daily-btn" class="bg-[#003566] p-2 rounded-b">
            Menu of the day
          </button>

          <button id="weekly-btn" class="bg-[#003566] p-2 rounded-b">
            Menu of the week
          </button>

          <button id="filter-btn" class="bg-[#003566] p-2 rounded-b">
            Filter
          </button>
        </div>

        <div id="restaurant-list" class="grid gap-4"></div>
      </div>
    </div>
  </body>

</html>
